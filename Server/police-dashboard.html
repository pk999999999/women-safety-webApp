<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakhi Sahayak — Police Dispatch Dashboard</title>
  <meta name="description" content="Real-time emergency dispatch dashboard for Sakhi-Sahayak women safety system. Live alerts, GPS tracking and WebRTC video feed.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0B0F1A;
      color: #E2E8F0;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #1E1B2E 0%, #0F172A 100%);
      border-bottom: 1px solid rgba(239, 68, 68, 0.3);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #EF4444, #F59E0B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge-live {
      background: #EF4444;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      animation: pulse 2s infinite;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge-live .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      animation: pulse 1.5s infinite;
    }

    .status-bar {
      padding: 8px 24px;
      background: rgba(16, 185, 129, 0.1);
      border-bottom: 1px solid rgba(16, 185, 129, 0.2);
      font-size: 0.85rem;
      color: #4ADE80;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar.alert {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
      color: #F87171;
      animation: flashAlert 1s ease-in-out 3;
    }

    @keyframes flashAlert {
      0%, 100% { background: rgba(239, 68, 68, 0.15); }
      50% { background: rgba(239, 68, 68, 0.35); }
    }

    .main-layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      height: calc(100vh - 100px);
    }

    .sidebar {
      background: #111827;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #94A3B8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .no-alerts {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }

    .no-alerts .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .alert-card {
      background: linear-gradient(145deg, #1E1B2E, #0F172A);
      border: 2px solid #EF4444;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease-out;
    }

    .alert-card:hover {
      border-color: #F59E0B;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.2);
    }

    .alert-card.active {
      border-color: #F59E0B;
      box-shadow: 0 0 40px rgba(245, 158, 11, 0.15);
    }

    .alert-card .severity {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .severity-critical { background: #991B1B; color: #FCA5A5; }
    .severity-high { background: #92400E; color: #FCD34D; }
    .severity-medium { background: #1E3A5F; color: #93C5FD; }
    .severity-low { background: #064E3B; color: #6EE7B7; }

    .alert-card .name {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 8px 0 4px 0;
      color: white;
    }

    .alert-card .lang-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      background: rgba(139, 92, 246, 0.2);
      color: #A78BFA;
      border: 1px solid rgba(139, 92, 246, 0.3);
      margin-left: 6px;
    }

    .alert-card .details {
      font-size: 0.8rem;
      color: #94A3B8;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .alert-card .transcript {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 8px;
      margin-top: 8px;
      font-size: 0.8rem;
      color: #F87171;
      font-style: italic;
    }

    .alert-card .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { transform: scale(1.03); }

    .btn-primary {
      background: linear-gradient(135deg, #16A34A, #22C55E);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #DC2626, #EF4444);
      color: white;
    }

    .btn-outline {
      background: transparent;
      color: #60A5FA;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .map-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      min-width: 280px;
    }

    .map-container {
      position: relative;
    }

    .webrtc-panel {
      margin-top: 12px;
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 12px;
      padding: 12px;
    }

    .webrtc-panel h4 {
      color: #A78BFA;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    #remoteVideo {
      width: 100%;
      border-radius: 8px;
      background: #0B0F1A;
      max-height: 200px;
    }

    .langgraph-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(139, 92, 246, 0.15);
      color: #A78BFA;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>🛡️ Sakhi Sahayak — Police Dispatch</h1>
      <div class="badge-live" id="liveBadge">
        <span class="dot"></span> LIVE
      </div>
    </div>
    <span style="color: #64748B; font-size: 0.8rem;" id="connectionStatus">Connecting...</span>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    ✅ System online. Waiting for incoming alerts...
  </div>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Sidebar: Alert List -->
    <div class="sidebar">
      <h2>🚨 Active Alerts</h2>
      <div id="alertList">
        <div class="no-alerts">
          <div class="icon">🛡️</div>
          <p>No active emergencies</p>
          <p style="font-size: 0.8rem; margin-top: 8px;">Alerts will appear here when LangGraph detects threats.</p>
        </div>
      </div>
    </div>

    <!-- Map Area -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════
    const activeAlerts = new Map();
    let selectedAlert = null;
    let map = null;
    let markers = {};

    const LANG_NAMES = {
      'hi-IN': '🇮🇳 Hindi',
      'mr-IN': '🇮🇳 Marathi',
      'en-IN': '🇬🇧 English',
      'unknown': '🌐 Auto'
    };

    // ═══════════════════════════════════════
    //  MAP INITIALIZATION
    // ═══════════════════════════════════════
    function initMap() {
      map = L.map('map').setView([21.146, 79.088], 13);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors © CARTO',
        maxZoom: 19
      }).addTo(map);
    }

    // ═══════════════════════════════════════
    //  SOCKET CONNECTION
    // ═══════════════════════════════════════
    const socket = io(window.location.origin);

    socket.on('connect', () => {
      document.getElementById('connectionStatus').textContent = `Connected (${socket.id})`;
      document.getElementById('connectionStatus').style.color = '#4ADE80';
      console.log('[PoliceDashboard] Connected:', socket.id);
    });

    socket.on('disconnect', () => {
      document.getElementById('connectionStatus').textContent = 'Disconnected';
      document.getElementById('connectionStatus').style.color = '#EF4444';
    });

    // ═══════════════════════════════════════
    //  EMERGENCY ALERT HANDLER
    //  LangGraph EMERGENCY_PROTOCOL State
    // ═══════════════════════════════════════
    socket.on('emergency-alert', (data) => {
      console.log('[PoliceDashboard] 🚨 EMERGENCY ALERT:', data);

      activeAlerts.set(data.trackingId, data);
      renderAlerts();
      updateStatusBar(data);

      // Add marker to map
      if (data.location && data.location.lat && data.location.lng) {
        const marker = L.marker([data.location.lat, data.location.lng], {
          icon: L.divIcon({
            html: `<div style="
              background: #EF4444;
              width: 28px; height: 28px;
              border-radius: 50%;
              border: 3px solid white;
              box-shadow: 0 0 24px rgba(239,68,68,0.8);
              display: flex; align-items: center; justify-content: center;
              font-size: 14px;
            ">🚨</div>`,
            iconSize: [28, 28],
            className: ''
          })
        }).addTo(map);

        marker.bindPopup(`
          <div style="font-family:Inter,sans-serif; padding:8px; background:#1E293B; border-radius:8px;">
            <strong style="color:#EF4444;">🚨 ${data.userName || 'Unknown User'}</strong><br/>
            <span style="font-size:0.8rem; color:#94A3B8;">${data.transcript || 'Distress detected'}</span><br/>
            <span style="font-size:0.75rem; color:#4ADE80;">${LANG_NAMES[data.detectedLanguage] || '🌐 Unknown'}</span><br/>
            <span style="font-size:0.7rem; color:#64748B;">ID: ${data.trackingId}</span>
          </div>
        `).openPopup();

        markers[data.trackingId] = marker;
        map.setView([data.location.lat, data.location.lng], 15);
      }

      // Play alert sound
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start();
        setTimeout(() => { osc.frequency.value = 1100; }, 150);
        setTimeout(() => { osc.frequency.value = 880; }, 300);
        setTimeout(() => { osc.frequency.value = 1100; }, 450);
        setTimeout(() => { osc.stop(); audioCtx.close(); }, 600);
      } catch (e) {}
    });

    // ── Live location updates for tracked users ──
    socket.on('emergency-location-update', (data) => {
      if (markers[data.trackingId]) {
        markers[data.trackingId].setLatLng([data.lat, data.lng]);
        map.panTo([data.lat, data.lng]);
      }
      // Update stored alert location
      const alert = activeAlerts.get(data.trackingId);
      if (alert) {
        alert.location = { lat: data.lat, lng: data.lng };
      }
    });

    // ── Emergency resolved ──
    socket.on('emergency-resolved', (data) => {
      console.log('[PoliceDashboard] Emergency resolved:', data.trackingId);
      const alert = activeAlerts.get(data.trackingId);
      if (alert) {
        alert.resolved = true;
        alert.resolvedAt = data.resolvedAt;
        alert.resolveReason = data.reason;
        renderAlerts();
      }

      // Remove marker pulse
      if (markers[data.trackingId]) {
        markers[data.trackingId].setIcon(L.divIcon({
          html: `<div style="
            background: #22C55E;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 12px rgba(34,197,94,0.6);
          ">✅</div>`,
          iconSize: [22, 22],
          className: ''
        }));
      }

      document.getElementById('statusBar').className = 'status-bar';
      document.getElementById('statusBar').textContent = `✅ Emergency ${data.trackingId} resolved. ${data.reason}`;
    });

    // ── Dispatch complete notification ──
    socket.on('emergency-dispatch-complete', (data) => {
      console.log('[PoliceDashboard] Dispatch complete:', data.trackingId, data.dispatchResults);
    });

    // ═══════════════════════════════════════
    //  RENDER FUNCTIONS
    // ═══════════════════════════════════════
    function renderAlerts() {
      const container = document.getElementById('alertList');

      if (activeAlerts.size === 0) {
        container.innerHTML = `
          <div class="no-alerts">
            <div class="icon">🛡️</div>
            <p>No active emergencies</p>
          </div>`;
        return;
      }

      let html = '';
      activeAlerts.forEach((alert, id) => {
        const severityClass = `severity-${alert.severity || 'high'}`;
        const isResolved = alert.resolved;
        const langDisplay = LANG_NAMES[alert.detectedLanguage] || '🌐 Unknown';

        html += `
          <div class="alert-card ${selectedAlert === id ? 'active' : ''} ${isResolved ? 'resolved' : ''}"
               id="card-${id}"
               onclick="selectAlert('${id}')"
               style="${isResolved ? 'opacity: 0.6; border-color: #22C55E;' : ''}">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="severity ${severityClass}">${isResolved ? '✅ RESOLVED' : (alert.severity || 'HIGH').toUpperCase()}</span>
              <span style="font-size:0.7rem; color:#64748B;">${new Date(alert.timestamp).toLocaleTimeString('en-IN')}</span>
            </div>
            <div class="name">
              ${alert.userName || 'Unknown User'}
              <span class="lang-badge">${langDisplay}</span>
            </div>
            <div class="details">
              <span>📞 ${alert.userPhone || 'N/A'}</span>
              <span>📍 ${alert.location ? `${alert.location.lat.toFixed(5)}, ${alert.location.lng.toFixed(5)}` : 'Unknown'}</span>
              <span>🆔 ${id}</span>
            </div>
            ${alert.transcript ? `<div class="transcript">🎤 "${alert.transcript}"</div>` : ''}
            <div class="langgraph-badge">⚡ LangGraph: ${alert.langGraphState || 'EMERGENCY_PROTOCOL'}</div>
            ${!isResolved ? `
              <div class="actions">
                <a href="${alert.googleMapsLink || '#'}" target="_blank" class="btn btn-outline">📍 Maps</a>
                <button class="btn btn-primary" onclick="event.stopPropagation(); joinWebRTC('${id}')">📹 Connect</button>
              </div>
            ` : ''}
          </div>`;
      });

      container.innerHTML = html;
    }

    function updateStatusBar(alert) {
      const bar = document.getElementById('statusBar');
      bar.className = 'status-bar alert';
      const langDisplay = LANG_NAMES[alert.detectedLanguage] || '🌐';
      bar.innerHTML = `🚨 INCOMING ALERT: ${alert.userName || 'Unknown'} — ${langDisplay} — "${(alert.transcript || '').substring(0, 40)}" — ${alert.severity?.toUpperCase() || 'HIGH'} — ${new Date(alert.timestamp).toLocaleTimeString('en-IN')}`;
    }

    function selectAlert(trackingId) {
      selectedAlert = trackingId;
      const alert = activeAlerts.get(trackingId);
      if (alert && alert.location) {
        map.setView([alert.location.lat, alert.location.lng], 16);
        if (markers[trackingId]) markers[trackingId].openPopup();
      }
      renderAlerts();
    }

    // ═══════════════════════════════════════
    //  WEBRTC — P2P Video with Victim Device
    // ═══════════════════════════════════════
    let peerConnection = null;

    function joinWebRTC(trackingId) {
      socket.emit('webrtc-join', { trackingId, role: 'police' });

      peerConnection = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      });

      peerConnection.ontrack = (event) => {
        let video = document.getElementById('remoteVideo');
        if (!video) {
          const overlay = document.createElement('div');
          overlay.className = 'map-overlay';
          overlay.id = 'webrtcOverlay';
          overlay.innerHTML = `
            <div class="webrtc-panel">
              <h4>📹 Live Feed — ${trackingId}</h4>
              <video id="remoteVideo" autoplay playsinline></video>
              <button class="btn btn-danger" style="margin-top:8px; width:100%;" onclick="endWebRTC('${trackingId}')">End Call</button>
            </div>`;
          document.querySelector('.map-container').appendChild(overlay);
          video = document.getElementById('remoteVideo');
        }
        video.srcObject = event.streams[0];
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('webrtc-ice-candidate', { trackingId, candidate: event.candidate });
        }
      };

      peerConnection.onconnectionstatechange = () => {
        console.log('[WebRTC] Connection state:', peerConnection.connectionState);
      };

      socket.on('webrtc-offer', async ({ sdp }) => {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('webrtc-answer', { trackingId, sdp: answer });
      });

      socket.on('webrtc-ice-candidate', ({ candidate }) => {
        peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      });
    }

    function endWebRTC(trackingId) {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      socket.emit('webrtc-leave', { trackingId });
      const overlay = document.getElementById('webrtcOverlay');
      if (overlay) overlay.remove();
    }

    // ═══════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════
    initMap();
  </script>
</body>
</html>
